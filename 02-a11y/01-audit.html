<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 01 - Audit</title>
  </head>
  <body>
    <form>
      Name:<br />
      <input type="text" name="name" /><br /><br />
      Address:<br />
      <input type="text" name="address" />
      <br /><br />
      City:<br />
      <input type="text" name="city" />
      <br /><br />
      Zip Code:<br />
      <input type="text" name="zip" />
      <br /><br />
      Credit Card Type:<br />
      <input type="radio" name="card" value="visa" /> Visa<br />
      <input type="radio" name="card" value="mastercard" /> MasterCard<br />
      <input type="radio" name="card" value="amex" /> American Express<br /><br />
      Credit Card Number:<br />
      <input type="text" name="cc_number" /><br /><br />
      CVV:<br />
      <input type="text" name="cvv" /><br /><br />
      <input type="button" value="Submit" />
    </form>
  </body>
</html>
