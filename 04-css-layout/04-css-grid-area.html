<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Layout Exercise 04 - CSS Grid Areas</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>CSS Layout Exercise 04 - CSS Grid Areas</h1>
      <div class="grid-area-container">
        <header class="grid-item header">Header</header>
        <article class="grid-item article">Article</article>
        <aside class="grid-item aside">Aside</aside>
        <section class="grid-item section">Section</section>
        <footer class="grid-item footer">Footer</footer>
      </div>
    </main>
  </body>
</html>
