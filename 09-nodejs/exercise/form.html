<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    />
    <title>Form Submission</title>
  </head>
  <body
    class="bg-primary min-vh-100 d-flex align-items-center justify-content-center"
  >
    <main class="container w-50 aling-items-center p-4 bg-light">
      <h1 class="mb-4 text-center">Form Submission</h1>
      <form method="post" action="/formExerciseSubmit">
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input type="text" class="form-control" name="nameInput" id="name" />
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input
            type="email"
            class="form-control"
            name="emailInput"
            id="email"
          />
        </div>
        <button type="submit" class="btn btn-primary w-100">Submit</button>
      </form>
    </main>
  </body>
</html>
